name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      # 如果你的主分支叫 master，請將上面的 main 改成 master

# 設定 GITHUB_TOKEN 的權限，以允許推送到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 允許同一時間只有一個部署執行，跳過排隊中的任務
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # 根據先前的避坑指南，加入 --legacy-peer-deps 避免套件依賴衝突
        run: npm install --legacy-peer-deps

      - name: Build project
        # 打包編譯 Vite 專案
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite 預設的打包輸出資料夾為 dist
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
